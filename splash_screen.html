<!-- ── STEP 1: ADD THIS TO <head> (replace your existing body visibility fix) ── -->
<style id="splash-styles">
/* Hide app content instantly — splash covers everything */
body { visibility: hidden; }

/* ── SPLASH WRAPPER ──────────────────────────────────────────── */
#app-splash {
  position: fixed; inset: 0; z-index: 2147483647;
  background: #080c25; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  visibility: visible;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
              transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
}

#app-splash.dismissing {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

/* ── ANIMATED CANVAS ─────────────────────────────────────────── */
#splash-canvas {
  position: absolute; inset: 0;
  z-index: 0; pointer-events: none;
}

/* ── CONTENT LAYER ───────────────────────────────────────────── */
.splash-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 20px;
}

/* ── LOGO ────────────────────────────────────────────────────── */
.splash-logo-wrap {
  position: relative;
  width: 110px; height: 110px; margin-bottom: 28px;
  opacity: 0; transform: scale(0.3) rotate(-15deg);
  animation: spl-logo 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
}

@keyframes spl-logo {
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

.splash-logo-ring {
  position: absolute; inset: -3px; border-radius: 30px;
  background: conic-gradient(#FF6B00, #FFD54F, #FF6B00, #FFD54F, #FF6B00);
  animation: spl-ring-spin 4s linear infinite;
  z-index: 0;
}

@keyframes spl-ring-spin { to { transform: rotate(360deg); } }

.splash-logo-inner {
  position: absolute; inset: 3px;
  background: linear-gradient(145deg, #1A237E 0%, #283593 60%, #1a237e 100%);
  border-radius: 27px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1;
  box-shadow: inset 0 2px 20px rgba(255,255,255,0.08);
}

.splash-logo-emoji { font-size: 42px; line-height: 1; }
.splash-logo-label {
  font-size: 8px; font-weight: 800; color: #FFD54F;
  letter-spacing: 2px; margin-top: 2px;
  text-transform: uppercase;
}

/* ── PULSE RINGS ─────────────────────────────────────────────── */
.splash-pulse {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(255,107,0,0.2);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: spl-pulse 3s ease-in-out infinite;
  pointer-events: none;
}
.splash-pulse:nth-child(2) { width: 180px; height: 180px; animation-delay: 0s; }
.splash-pulse:nth-child(3) { width: 260px; height: 260px; animation-delay: 0.6s; }
.splash-pulse:nth-child(4) { width: 340px; height: 340px; animation-delay: 1.2s; }

@keyframes spl-pulse {
  0%, 100% { opacity: 0.2; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 0.5; transform: translate(-50%,-50%) scale(1.04); }
}

/* ── TITLE ───────────────────────────────────────────────────── */
.splash-title {
  font-family: 'Syne', 'Segoe UI', sans-serif;
  font-size: 34px; font-weight: 800; color: #fff;
  letter-spacing: -0.5px; line-height: 1.1;
  opacity: 0; transform: translateY(24px);
  animation: spl-up 0.6s ease 0.85s forwards;
}

.splash-title .accent { color: #FF6B00; }

.splash-subtitle {
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
  letter-spacing: 3px; text-transform: uppercase; margin-top: 8px;
  opacity: 0; transform: translateY(20px);
  animation: spl-up 0.6s ease 1.0s forwards;
}

.splash-tagline {
  font-size: 15px; color: rgba(255,255,255,0.65);
  margin-top: 10px; font-style: italic;
  opacity: 0; transform: translateY(16px);
  animation: spl-up 0.6s ease 1.1s forwards;
}

@keyframes spl-up {
  to { opacity: 1; transform: translateY(0); }
}

/* ── STATS ───────────────────────────────────────────────────── */
.splash-stats {
  display: flex; gap: 0; margin-top: 30px;
  opacity: 0; transform: translateY(20px);
  animation: spl-up 0.6s ease 1.3s forwards;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; overflow: hidden;
}

.splash-stat {
  padding: 14px 22px; text-align: center;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.splash-stat:last-child { border-right: none; }

.splash-stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 800; color: #FFD54F;
  line-height: 1;
}

.splash-stat-lbl {
  font-size: 10px; color: rgba(255,255,255,0.35);
  letter-spacing: 1px; text-transform: uppercase;
  font-weight: 700; margin-top: 3px;
}

/* ── FEATURE CHIPS ───────────────────────────────────────────── */
.splash-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-top: 22px;
  max-width: 340px;
  opacity: 0; transform: translateY(20px);
  animation: spl-up 0.6s ease 1.5s forwards;
}

.splash-chip {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  animation: spl-chip-glow 2.5s ease infinite alternate;
}

.splash-chip:nth-child(1) { animation-delay: 0.0s; }
.splash-chip:nth-child(2) { animation-delay: 0.4s; }
.splash-chip:nth-child(3) { animation-delay: 0.8s; }
.splash-chip:nth-child(4) { animation-delay: 1.2s; }
.splash-chip:nth-child(5) { animation-delay: 1.6s; }

@keyframes spl-chip-glow {
  from { border-color: rgba(255,255,255,0.08); }
  to   { border-color: rgba(255,107,0,0.5); color: #fff; }
}

/* ── PROGRESS ────────────────────────────────────────────────── */
.splash-progress-wrap {
  margin-top: 36px; width: 220px;
  opacity: 0; transform: translateY(16px);
  animation: spl-up 0.6s ease 1.8s forwards;
}

.splash-progress-label {
  font-size: 11px; color: rgba(255,255,255,0.35);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 10px; text-align: center;
}

.splash-progress-bar {
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px; overflow: hidden;
}

.splash-progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #FF6B00, #FFD54F);
  border-radius: 10px;
  animation: spl-progress 3s ease 2s forwards;
  box-shadow: 0 0 8px rgba(255,107,0,0.8);
}

@keyframes spl-progress {
  0%  { width: 0%; }
  25% { width: 30%; }
  50% { width: 60%; }
  80% { width: 85%; }
  100%{ width: 100%; }
}

/* ── BOTTOM CREDIT ───────────────────────────────────────────── */
.splash-credit {
  position: absolute; bottom: 24px;
  font-size: 10px; color: rgba(255,255,255,0.2);
  letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
  opacity: 0; animation: spl-up 0.6s ease 2.2s forwards;
}

/* ── MOBILE RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .splash-title { font-size: 28px; }
  .splash-logo-wrap { width: 90px; height: 90px; }
  .splash-logo-emoji { font-size: 34px; }
  .splash-stats { flex-wrap: wrap; }
  .splash-stat { padding: 10px 16px; }
}
</style>

<!-- ── STEP 3: ADD THIS BEFORE </body> (or in a <script> tag) ────────────── -->
<script id="splash-script">
(function() {
  /* ── PARTICLE CANVAS ──────────────────────────────────────── */
  const canvas = document.getElementById('splash-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const NAVY = '#1A237E';
  const SAFFRON = '#FF6B00';
  const GOLD = '#FFD54F';

  // Stars
  const stars = Array.from({ length: 160 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.015 + 0.005
  }));

  // Floating particles
  const floats = Array.from({ length: 40 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    r: Math.random() * 2 + 0.5,
    phase: Math.random() * Math.PI * 2,
    isSaffron: Math.random() > 0.5
  }));

  let shooters = [];
  let frame = 0;

  function spawnShooter() {
    const w = canvas.width, h = canvas.height;
    shooters.push({
      x: Math.random() * w, y: Math.random() * h * 0.4,
      len: Math.random() * 90 + 50,
      speed: Math.random() * 7 + 5,
      alpha: 1,
      cos: Math.cos(Math.PI / 4), sin: Math.sin(Math.PI / 4)
    });
  }

  function draw() {
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    frame++;

    // Background
    ctx.fillStyle = '#080c25';
    ctx.fillRect(0, 0, w, h);

    // Subtle grid lines
    ctx.strokeStyle = 'rgba(26,35,126,0.12)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < w; x += 70) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += 70) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Center ambient glow
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(w, h) * 0.6);
    grd.addColorStop(0, 'rgba(26,35,126,0.25)');
    grd.addColorStop(0.4, 'rgba(255,107,0,0.05)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);

    // Stars
    stars.forEach(s => {
      s.phase += s.speed;
      const a = 0.2 + 0.5 * (0.5 + 0.5 * Math.sin(s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
      ctx.fill();
    });

    // Floating particles
    floats.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.phase += 0.02;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      const a = (0.3 + 0.3 * Math.sin(p.phase)).toFixed(2);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.isSaffron ? `rgba(255,107,0,${a})` : `rgba(255,213,79,${a})`;
      ctx.fill();
    });

    // Orbiting dots around logo center
    const orbit1 = Math.min(w, h) * 0.22;
    const orbit2 = Math.min(w, h) * 0.28;
    for (let i = 0; i < 8; i++) {
      const angle = (frame * 0.006) + (i * Math.PI * 2 / 8);
      const r = i % 2 === 0 ? orbit1 : orbit2;
      const ox = cx + Math.cos(angle) * r;
      const oy = cy + Math.sin(angle) * r;
      ctx.beginPath();
      ctx.arc(ox, oy, i % 2 === 0 ? 2.5 : 1.5, 0, Math.PI * 2);
      ctx.fillStyle = i % 2 === 0 ? 'rgba(255,107,0,0.45)' : 'rgba(255,213,79,0.35)';
      ctx.fill();
    }

    // Shooting stars
    if (frame % 160 === 0) spawnShooter();
    shooters = shooters.filter(s => s.alpha > 0.03);
    shooters.forEach(s => {
      s.x += s.cos * s.speed;
      s.y += s.sin * s.speed;
      s.alpha -= 0.018;
      ctx.save();
      ctx.globalAlpha = Math.min(s.alpha, 1);
      const g = ctx.createLinearGradient(s.x, s.y, s.x - s.cos * s.len, s.y - s.sin * s.len);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.cos * s.len, s.y - s.sin * s.len);
      ctx.stroke();
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }
  draw();

  /* ── LOADING TEXT CYCLE ──────────────────────────────────── */
  const loadTexts = [
    'Loading resources...', 'Fetching MCQ bank...', 'Setting up PYQs...',
    'Checking your access...', 'Almost there...'
  ];
  let ltIdx = 0;
  const ltEl = document.getElementById('splash-load-txt');
  const ltInterval = setInterval(() => {
    ltIdx = (ltIdx + 1) % loadTexts.length;
    if (ltEl) ltEl.textContent = loadTexts[ltIdx];
  }, 700);

  /* ── REVEAL BODY + DISMISS SPLASH ──────────────────────────
   * Call window.dismissSplash() from auth.js once:
   *   - Firebase auth state is resolved
   *   - Login screen OR app is ready to show
   *
   * Usage in auth.js — inside onAuthStateChanged callback:
   *   if (user) {
   *     await _loadAndInitUser(user.uid);
   *     await _checkAdmin(user.email);
   *     onUserLoggedIn(user);
   *     window.dismissSplash && window.dismissSplash();
   *   } else {
   *     showLoginScreen();
   *     window.dismissSplash && window.dismissSplash();
   *   }
   */
  window.dismissSplash = function() {
    clearInterval(ltInterval);
    document.body.style.visibility = 'visible'; // reveal app
    const splash = document.getElementById('app-splash');
    if (!splash) return;
    // Short delay so app content is painted before we start fading
    setTimeout(() => {
      splash.classList.add('dismissing');
      setTimeout(() => { splash.remove(); }, 700);
    }, 80);
  };

  /* Safety fallback: if auth takes > 8 seconds, dismiss anyway */
  setTimeout(() => {
    if (document.getElementById('app-splash')) {
      window.dismissSplash();
    }
  }, 8000);

})();
</script>
